name: Cleanup Downloads & History

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'What to clean'
        required: true
        type: choice
        options:
          - 'Clean Everything'
          - 'Clean Downloads Only'
          - 'Clean History Only'
          - 'Keep Last 3 Downloads'
          - 'Keep Last 5 Downloads'

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Clean Everything
        if: github.event.inputs.target == 'Clean Everything'
        run: |
          rm -rf downloads history
          mkdir -p downloads history
          touch downloads/.gitkeep
          git add -A downloads/ history/
          git commit -m "Clean everything" || echo "Nothing to commit"
          git push || echo "Nothing to push"

      - name: Clean Downloads Only
        if: github.event.inputs.target == 'Clean Downloads Only'
        run: |
          rm -rf downloads
          mkdir -p downloads
          touch downloads/.gitkeep
          git add -A downloads/
          git commit -m "Clean downloads" || echo "Nothing to commit"
          git push || echo "Nothing to push"

      - name: Clean History Only
        if: github.event.inputs.target == 'Clean History Only'
        run: |
          rm -rf history
          mkdir -p history
          git add -A history/
          git commit -m "Clean history" || echo "Nothing to commit"
          git push || echo "Nothing to push"

      - name: Keep Last 3 Downloads
        if: github.event.inputs.target == 'Keep Last 3 Downloads'
        run: |
          DIRS=$(find downloads -maxdepth 1 -type d ! -name 'downloads' | sort -r)
          COUNT=0
          for dir in $DIRS; do
            COUNT=$((COUNT + 1))
            if [ $COUNT -gt 3 ]; then
              echo "Removing: $dir"
              rm -rf "$dir"
            fi
          done
          git add -A downloads/
          git commit -m "Keep last 3 downloads" || echo "Nothing to commit"
          git push || echo "Nothing to push"

      - name: Keep Last 5 Downloads
        if: github.event.inputs.target == 'Keep Last 5 Downloads'
        run: |
          DIRS=$(find downloads -maxdepth 1 -type d ! -name 'downloads' | sort -r)
          COUNT=0
          for dir in $DIRS; do
            COUNT=$((COUNT + 1))
            if [ $COUNT -gt 5 ]; then
              echo "Removing: $dir"
              rm -rf "$dir"
            fi
          done
          git add -A downloads/
          git commit -m "Keep last 5 downloads" || echo "Nothing to commit"
          git push || echo "Nothing to push"
