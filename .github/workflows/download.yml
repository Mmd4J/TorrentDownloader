name: Torrent Downloader

on:
  workflow_dispatch:
    inputs:
      torrent_url:
        description: 'Torrent URL or Magnet Link'
        required: true
        type: string
      max_connections:
        description: 'Max connections per file (default: 16)'
        required: false
        type: string
        default: '16'
      split_size:
        description: 'Split size in MB (default: 95)'
        required: false
        type: string
        default: '95'
      select_files:
        description: 'Select specific files (comma-separated indexes, e.g., "1,3,5" or leave empty for all)'
        required: false
        type: string
        default: ''
      file_pattern:
        description: 'File pattern to match (e.g., "*.mkv", "*.mp4" or leave empty for all)'
        required: false
        type: string
        default: ''
      mode:
        description: 'Operation mode'
        required: true
        type: choice
        options:
          - 'Download Files'
          - 'Show Torrent Info Only'
        default: 'Download Files'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 p7zip-full p7zip-rar wget curl jq python3
      
      - name: Create directories
        run: |
          mkdir -p downloads history .temp
      
      - name: Get torrent info and list files
        id: torrent_info
        run: |
          TORRENT_INPUT="${{ github.event.inputs.torrent_url }}"
          
          echo "==========================================="
          echo "Getting torrent information..."
          echo "==========================================="
          
          if [[ "$TORRENT_INPUT" != magnet:* ]]; then
            echo "Downloading torrent file..."
            wget -O ".temp/torrent.torrent" "$TORRENT_INPUT"
            TORRENT_FILE=".temp/torrent.torrent"
          else
            echo "Getting magnet link metadata..."
            aria2c --show-files=true \
                   --dir=".temp" \
                   --bt-save-metadata=true \
                   --bt-metadata-only=true \
                   "$TORRENT_INPUT" 2>&1
            TORRENT_FILE=$(find ".temp" -name "*.torrent" 2>/dev/null | head -n1)
          fi
          
          if [ -f "$TORRENT_FILE" ]; then
            echo ""
            echo "📋 Files available in torrent:"
            echo "================================"
            
            # Parse file listing
            aria2c --show-files=true "$TORRENT_FILE" 2>&1 | grep -E '^[[:space:]]*[0-9]+\|' > ".temp/file_list.txt"
            
            INDEX=1
            > ".temp/parsed_files.txt"
            while IFS='|' read -r idx size path; do
              idx=$(echo "$idx" | xargs)
              size=$(echo "$size" | xargs)
              path=$(echo "$path" | xargs)
              [ -z "$path" ] && continue
              
              if command -v numfmt &> /dev/null; then
                SIZE_HUMAN=$(numfmt --to=iec "$size" 2>/dev/null)
              else
                SIZE_HUMAN="$size bytes"
              fi
              
              echo "[${INDEX}] ${path} (${SIZE_HUMAN})"
              echo "${INDEX}|${idx}|${size}|${path}" >> ".temp/parsed_files.txt"
              INDEX=$((INDEX + 1))
            done < ".temp/file_list.txt"
            
            echo "================================"
            echo "Total files: $((INDEX - 1))"
            echo "torrent_file=${TORRENT_FILE}" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Could not retrieve torrent metadata"
          fi
      
      - name: Show torrent info only
        if: github.event.inputs.mode == 'Show Torrent Info Only'
        run: |
          TEHRAN_TIME=$(TZ='Asia/Tehran' date +'%Y-%m-%d %H:%M')
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          mkdir -p "history/${TIMESTAMP}"
          
          # Create torrent info markdown
          cat > "history/${TIMESTAMP}/torrent_info.md" << EOF
          # 📋 Torrent Contents
          
          **Date:** ${TEHRAN_TIME} (Tehran Time)
          
          **Torrent/Magnet:**
          \`\`\`
          ${{ github.event.inputs.torrent_url }}
          \`\`\`
          
          **Files:**
          
          | # | File | Size |
          |---|------|------|
          EOF
          
          if [ -f ".temp/parsed_files.txt" ]; then
            while IFS='|' read -r display_idx aria2_idx size path; do
              if command -v numfmt &> /dev/null; then
                SIZE_HUMAN=$(numfmt --to=iec "$size" 2>/dev/null)
              else
                SIZE_HUMAN="$size bytes"
              fi
              echo "| ${display_idx} | \`${path}\` | ${SIZE_HUMAN} |" >> "history/${TIMESTAMP}/torrent_info.md"
            done < ".temp/parsed_files.txt"
          fi
          
          echo "" >> "history/${TIMESTAMP}/torrent_info.md"
          echo "> 💡 **To download:** Run workflow again with **mode: Download Files**" >> "history/${TIMESTAMP}/torrent_info.md"
          echo "> Use **select_files** field with comma-separated numbers (e.g., 1,3,5) for specific files" >> "history/${TIMESTAMP}/torrent_info.md"
          
          # Update history
          if [ -f "history/README.md" ]; then
            python3 -c "
          content = open('history/README.md').read()
          entry = '### 📋 ${TEHRAN_TIME} (Tehran) - [Torrent Info](${TIMESTAMP}/torrent_info.md)\n\n---\n\n'
          if '## 📥 Download History' in content:
              parts = content.split('## 📥 Download History', 1)
              new_content = parts[0] + '## 📥 Download History\n\n' + entry + parts[1]
          else:
              new_content = content + '\n' + entry
          open('history/README.md', 'w').write(new_content)
          "
          else
            cat > "history/README.md" << EOF
          # 📥 Torrent Download History
          
          All times in **Tehran timezone (IR)**.
          
          ## 📥 Download History
          
          ### 📋 ${TEHRAN_TIME} (Tehran) - [Torrent Info](${TIMESTAMP}/torrent_info.md)
          
          ---
          
          EOF
          fi
          
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add history/
          git commit -m "📋 Torrent info: ${TIMESTAMP}" || echo "Nothing to commit"
          git push
      
      - name: Determine files to download
        if: github.event.inputs.mode == 'Download Files'
        id: file_selection
        run: |
          SELECT_FILES="${{ github.event.inputs.select_files }}"
          FILE_PATTERN="${{ github.event.inputs.file_pattern }}"
          
          if [ -n "$SELECT_FILES" ] && [ -f ".temp/parsed_files.txt" ]; then
            echo "Selecting files by index: $SELECT_FILES"
            IFS=',' read -ra INDEXES <<< "$SELECT_FILES"
            ARIA2_INDEXES=()
            for i in "${INDEXES[@]}"; do
              i=$(echo "$i" | xargs)
              ARIA2_IDX=$(grep "^${i}|" ".temp/parsed_files.txt" | cut -d'|' -f2)
              [ -n "$ARIA2_IDX" ] && ARIA2_INDEXES+=("$ARIA2_IDX")
            done
            if [ ${#ARIA2_INDEXES[@]} -gt 0 ]; then
              echo "select_option=--select-file=$(IFS=','; echo "${ARIA2_INDEXES[*]}")" >> $GITHUB_OUTPUT
              echo "Will download files: ${ARIA2_INDEXES[*]}"
            fi
          elif [ -n "$FILE_PATTERN" ] && [ -f ".temp/parsed_files.txt" ]; then
            echo "Selecting files by pattern: $FILE_PATTERN"
            ARIA2_INDEXES=()
            while IFS='|' read -r display_idx aria2_idx size path; do
              if [[ "$path" == $FILE_PATTERN ]]; then
                ARIA2_INDEXES+=("$aria2_idx")
                echo "  Match: [$display_idx] $path"
              fi
            done < ".temp/parsed_files.txt"
            if [ ${#ARIA2_INDEXES[@]} -gt 0 ]; then
              echo "select_option=--select-file=$(IFS=','; echo "${ARIA2_INDEXES[*]}")" >> $GITHUB_OUTPUT
            fi
          else
            echo "Downloading ALL files"
          fi
      
      - name: Download torrent files
        if: github.event.inputs.mode == 'Download Files'
        id: download
        run: |
          echo "==========================================="
          echo "STARTING DOWNLOAD"
          echo "==========================================="
          
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          
          # Extract clean name from torrent/magnet
          CLEAN_NAME="download"
          if echo "${{ github.event.inputs.torrent_url }}" | grep -q "dn="; then
            CLEAN_NAME=$(echo "${{ github.event.inputs.torrent_url }}" | grep -oP 'dn=[^&]*' | sed 's/dn=//' | python3 -c "import sys, urllib.parse; print(urllib.parse.unquote(sys.stdin.read().strip()))" 2>/dev/null)
            CLEAN_NAME=$(echo "$CLEAN_NAME" | sed 's/[^a-zA-Z0-9._-]/_/g' | cut -c1-100)
          fi
          
          DOWNLOAD_DIR="downloads/${TIMESTAMP}_${CLEAN_NAME}"
          mkdir -p "$DOWNLOAD_DIR"
          echo "Download directory: $DOWNLOAD_DIR"
          
          # Prepare input
          if [[ "${{ github.event.inputs.torrent_url }}" == magnet:* ]]; then
            ARIA2_INPUT="${{ github.event.inputs.torrent_url }}"
          else
            wget -O "${DOWNLOAD_DIR}/torrent.torrent" "${{ github.event.inputs.torrent_url }}"
            ARIA2_INPUT="${DOWNLOAD_DIR}/torrent.torrent"
          fi
          
          # Build and run aria2 command
          echo "Running aria2c..."
          aria2c --seed-time=0 \
                 --max-connection-per-server=${{ github.event.inputs.max_connections }} \
                 --split=${{ github.event.inputs.max_connections }} \
                 --dir="$DOWNLOAD_DIR" \
                 --allow-overwrite=true \
                 --file-allocation=none \
                 --console-log-level=notice \
                 ${{ steps.file_selection.outputs.select_option }} \
                 "$ARIA2_INPUT"
          
          DOWNLOAD_EXIT=$?
          echo "Download exit code: $DOWNLOAD_EXIT"
          
          # Clean up
          rm -f "${DOWNLOAD_DIR}/torrent.torrent" "${DOWNLOAD_DIR}"/*.aria2
          
          echo ""
          echo "Downloaded files:"
          find "$DOWNLOAD_DIR" -type f -exec ls -lh {} \;
          
          echo "download_dir=${DOWNLOAD_DIR}" >> $GITHUB_OUTPUT
          echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT
      
      - name: Split large files
        if: github.event.inputs.mode == 'Download Files'
        run: |
          DOWNLOAD_DIR="${{ steps.download.outputs.download_dir }}"
          SPLIT_SIZE_MB="${{ github.event.inputs.split_size }}"
          SPLIT_SIZE=$((SPLIT_SIZE_MB * 1048576))
          
          echo "Checking for files larger than ${SPLIT_SIZE_MB}MB..."
          
          find "$DOWNLOAD_DIR" -type f ! -name "*.torrent" ! -name "*.aria2" ! -name "*.7z.*" -print0 | while IFS= read -r -d '' file; do
            FILE_SIZE=$(stat -c%s "$file" 2>/dev/null)
            
            if [ "$FILE_SIZE" -gt "$SPLIT_SIZE" ]; then
              echo "Splitting: $(basename "$file") ($(echo "$FILE_SIZE" | numfmt --to=iec 2>/dev/null || echo "${FILE_SIZE} bytes"))"
              
              DIRNAME=$(dirname "$file")
              BASENAME=$(basename "$file")
              
              7z a -v${SPLIT_SIZE_MB}m -mx0 "${DIRNAME}/${BASENAME}.7z" "$file"
              
              if [ $? -eq 0 ]; then
                echo "  ✓ Split successful, removing original"
                rm "$file"
              else
                echo "  ✗ Split failed, keeping original"
              fi
            fi
          done
          
          echo ""
          echo "Files after splitting:"
          find "$DOWNLOAD_DIR" -type f -exec ls -lh {} \;
      
      - name: Generate report
        if: github.event.inputs.mode == 'Download Files'
        run: |
          DOWNLOAD_DIR="${{ steps.download.outputs.download_dir }}"
          TIMESTAMP="${{ steps.download.outputs.timestamp }}"
          REPORT_DIR="history/${TIMESTAMP}"
          mkdir -p "$REPORT_DIR"
          
          cat > "${REPORT_DIR}/manifest.json" << EOF
          {
            "timestamp": "${TIMESTAMP}",
            "torrent": "${{ github.event.inputs.torrent_url }}",
            "download_date": "$(date -u +"%Y-%m-%d %H:%M:%S UTC")",
            "download_dir": "${DOWNLOAD_DIR}",
            "files": [
          EOF
          
          FIRST=true
          find "$DOWNLOAD_DIR" -type f ! -name "*.torrent" ! -name "*.aria2" -print0 | sort -z | while IFS= read -r -d '' file; do
            REL_PATH="${file#$DOWNLOAD_DIR/}"
            FILE_SIZE=$(stat -c%s "$file" 2>/dev/null)
            FILE_HASH=$(sha256sum "$file" | cut -d' ' -f1)
            SIZE_HUMAN=$(echo "$FILE_SIZE" | numfmt --to=iec 2>/dev/null || echo "${FILE_SIZE} bytes")
            
            if [ "$FIRST" = false ]; then
              echo "," >> "${REPORT_DIR}/manifest.json"
            fi
            FIRST=false
            
            cat >> "${REPORT_DIR}/manifest.json" << EOF
              {"path": "${REL_PATH}", "size": ${FILE_SIZE}, "size_human": "${SIZE_HUMAN}", "sha256": "${FILE_HASH}"}
          EOF
          done
          
          echo "" >> "${REPORT_DIR}/manifest.json"
          echo "  ]" >> "${REPORT_DIR}/manifest.json"
          echo "}" >> "${REPORT_DIR}/manifest.json"
          
          echo "Report generated at ${REPORT_DIR}/manifest.json"
      
      - name: Update history
        if: github.event.inputs.mode == 'Download Files'
        run: |
          TIMESTAMP="${{ steps.download.outputs.timestamp }}"
          TORRENT_URL="${{ github.event.inputs.torrent_url }}"
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          DOWNLOAD_DIR="${{ steps.download.outputs.download_dir }}"
          
          MANIFEST_FILE="history/${TIMESTAMP}/manifest.json"
          HISTORY_README="history/README.md"
          TEHRAN_TIME=$(TZ='Asia/Tehran' date +'%Y-%m-%d %H:%M')
          
          echo "Updating history..."
          echo "Manifest: $MANIFEST_FILE"
          echo "Download dir: $DOWNLOAD_DIR"
          
          # Use Python for reliable file processing
          python3 << PYEOF
          import json
          import urllib.parse
          import os
          import re
          from collections import defaultdict
          
          manifest_file = "${MANIFEST_FILE}"
          repo = "${REPO}"
          branch = "${BRANCH}"
          download_dir = "${DOWNLOAD_DIR}"
          torrent_url = "${TORRENT_URL}"
          tehran_time = "${TEHRAN_TIME}"
          
          # Read manifest
          with open(manifest_file) as f:
              manifest = json.load(f)
          
          # Group files
          normal_files = []
          split_groups = defaultdict(list)
          
          for file_info in manifest['files']:
              path = file_info['path']
              match = re.match(r'(.+)\.7z\.(\d{3})$', path)
              if match:
                  base_name = match.group(1)
                  split_groups[base_name].append(file_info)
              else:
                  normal_files.append(file_info)
          
          # Build entry
          entry = f"### 📅 {tehran_time} (Tehran)\n\n"
          entry += "**Torrent/Magnet:**\n```\n" + torrent_url + "\n```\n\n"
          entry += "**Files:**\n\n"
          
          # Icons mapping
          icons = {
              'zip': '🗜️', 'rar': '📚', '7z': '📦',
              'mkv': '🎬', 'mp4': '🎬', 'avi': '🎬', 'mov': '🎬', 'webm': '🎬',
              'mp3': '🎵', 'flac': '🎵', 'ogg': '🎵', 'm4a': '🎵', 'wav': '🎵',
              'jpg': '🖼️', 'jpeg': '🖼️', 'png': '🖼️', 'gif': '🖼️', 'webp': '🖼️',
              'pdf': '📕', 'epub': '📗', 'mobi': '📘',
              'txt': '📄', 'srt': '💬', 'sub': '💬', 'ass': '💬',
              'exe': '⚙️', 'apk': '📱',
          }
          
          def get_icon(path):
              ext = path.lower().split('.')[-1] if '.' in path else ''
              return icons.get(ext, '📄')
          
          def make_link(path, download_dir, repo, branch):
              encoded = urllib.parse.quote(path, safe='')
              full_path = f"{download_dir}/{encoded}"
              return f"https://raw.githubusercontent.com/{repo}/{branch}/{full_path}"
          
          # Process normal files
          for file_info in normal_files:
              path = file_info['path']
              size = file_info['size_human']
              icon = get_icon(path)
              link = make_link(path, download_dir, repo, branch)
              entry += f"- {icon} [**{path}**]({link}) - {size}\n"
          
          # Process split groups
          for base_name, parts in sorted(split_groups.items()):
              parts.sort(key=lambda x: x['path'])
              
              total_size = sum(p['size'] for p in parts)
              if total_size >= 1073741824:
                  total_human = f"{total_size/1073741824:.2f}GB"
              elif total_size >= 1048576:
                  total_human = f"{total_size/1048576:.1f}MB"
              elif total_size >= 1024:
                  total_human = f"{total_size//1024}KB"
              else:
                  total_human = f"{total_size}B"
              
              entry += f"\n- 📦 **{base_name}.7z** (Split Archive - {total_human} total)\n"
              
              total_parts = len(parts)
              for i, part in enumerate(parts):
                  path = part['path']
                  size = part['size_human']
                  link = make_link(path, download_dir, repo, branch)
                  prefix = "  └─" if i == total_parts - 1 else "  ├─"
                  entry += f"{prefix} 📎 [**{path}**]({link}) - {size}\n"
              
              first_part = parts[0]['path']
              entry += f"  💡 *Download all parts, then:* `7z x {first_part}`\n"
          
          entry += "\n---\n\n"
          
          # Update history README
          history_readme = "${HISTORY_README}"
          if os.path.exists(history_readme):
              with open(history_readme) as f:
                  content = f.read()
              
              marker = '## 📥 Download History'
              if marker in content:
                  parts = content.split(marker, 1)
                  new_content = parts[0] + marker + '\n\n' + entry + parts[1]
              else:
                  new_content = content + '\n' + entry
          else:
              new_content = f"""# 📥 Torrent Download History

          All times in **Tehran timezone (IR)**.

          ## 📥 Download History

          {entry}
          """
          
          with open(history_readme, 'w') as f:
              f.write(new_content)
          
          print("✅ History updated successfully!")
          PYEOF
      
      - name: Commit and push changes
        if: github.event.inputs.mode == 'Download Files'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          rm -rf .temp
          
          git add downloads/ history/
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📥 Download: ${{ steps.download.outputs.timestamp }}"
            git push
          fi
          
          echo "==========================================="
          echo "DONE! View history at:"
          echo "https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/history/README.md"
          echo "==========================================="
