name: Torrent Downloader

on:
  workflow_dispatch:
    inputs:
      torrent_url:
        description: 'Torrent URL or Magnet Link'
        required: true
        type: string
      max_connections:
        description: 'Max connections per file (default: 16)'
        required: false
        type: string
        default: '16'
      split_size:
        description: 'Split size in MB (default: 95)'
        required: false
        type: string
        default: '95'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 p7zip-full p7zip-rar wget curl
      
      - name: Create directories
        run: |
          mkdir -p downloads
          mkdir -p history
      
      - name: Download torrent
        id: download
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          CLEAN_NAME=$(echo "${{ github.event.inputs.torrent_url }}" | grep -oP 'dn=[^&]*' | sed 's/dn=//' | python3 -c "import sys, urllib.parse; print(urllib.parse.unquote(sys.stdin.read().strip()))" 2>/dev/null || echo "download")
          DOWNLOAD_DIR="downloads/${TIMESTAMP}_${CLEAN_NAME}"
          mkdir -p "$DOWNLOAD_DIR"
          
          if [[ "${{ github.event.inputs.torrent_url }}" == magnet:* ]]; then
            aria2c --seed-time=0 \
                   --max-connection-per-server=${{ github.event.inputs.max_connections }} \
                   --split=${{ github.event.inputs.max_connections }} \
                   --dir="$DOWNLOAD_DIR" \
                   "${{ github.event.inputs.torrent_url }}"
          else
            wget -O "${DOWNLOAD_DIR}/torrent.torrent" "${{ github.event.inputs.torrent_url }}"
            aria2c --seed-time=0 \
                   --max-connection-per-server=${{ github.event.inputs.max_connections }} \
                   --split=${{ github.event.inputs.max_connections }} \
                   --dir="$DOWNLOAD_DIR" \
                   "${DOWNLOAD_DIR}/torrent.torrent"
          fi
          
          echo "download_dir=${DOWNLOAD_DIR}" >> $GITHUB_OUTPUT
          echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT
      
      - name: Split large files
        run: |
          DOWNLOAD_DIR="${{ steps.download.outputs.download_dir }}"
          SPLIT_SIZE="${{ github.event.inputs.split_size }}"
          bash scripts/split_large_files.sh "$DOWNLOAD_DIR" "$SPLIT_SIZE"
      
      - name: Generate report
        run: |
          DOWNLOAD_DIR="${{ steps.download.outputs.download_dir }}"
          TIMESTAMP="${{ steps.download.outputs.timestamp }}"
          bash scripts/generate_report.sh "$DOWNLOAD_DIR" "$TIMESTAMP" "${{ github.event.inputs.torrent_url }}"
      
      - name: Update history
        run: |
          python3 scripts/update_history.py \
            --timestamp "${{ steps.download.outputs.timestamp }}" \
            --torrent "${{ github.event.inputs.torrent_url }}" \
            --repo "${{ github.repository }}" \
            --branch "main"
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add downloads/ history/ README.md
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📥 Download completed: ${{ steps.download.outputs.timestamp }}"
            git push
          fi
