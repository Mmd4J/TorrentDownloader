name: Torrent Downloader

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action'
        required: true
        type: choice
        options:
        - 'Download torrent'
        - 'Show torrent info only'
        
      torrent_url:
        description: 'Torrent file URL or Magnet link'
        required: true
        type: string
        
      download_path:
        description: 'Download path (default: downloads)'
        required: false
        type: string
        default: 'downloads'
        
      max_connections:
        description: 'Max connections per torrent'
        required: false
        type: string
        default: '16'

jobs:
  show-info:
    if: ${{ github.event.inputs.action == 'Show torrent info only' }}
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Install aria2
      run: |
        sudo apt-get update
        sudo apt-get install -y aria2 p7zip-full jq
    
    - name: Make scripts executable
      run: chmod +x scripts/*.sh
    
    - name: Show torrent info
      run: |
        ./scripts/torrent-info.sh "${{ github.event.inputs.torrent_url }}"
        echo ""
        echo "::notice::To download, run the workflow again with 'Download torrent' option"

  download:
    if: ${{ github.event.inputs.action == 'Download torrent' }}
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y aria2 p7zip-full jq
    
    - name: Make scripts executable
      run: chmod +x scripts/*.sh
    
    - name: Create download directory
      run: mkdir -p "${{ github.event.inputs.download_path }}"
    
    - name: Download torrent
      run: |
        ./scripts/download.sh \
          "${{ github.event.inputs.torrent_url }}" \
          "${{ github.event.inputs.download_path }}" \
          "${{ github.event.inputs.max_connections }}"
      timeout-minutes: 360
    
    - name: Split large files
      run: |
        ./scripts/split_large_files.sh "${{ github.event.inputs.download_path }}"
    
    - name: Update download history
      run: |
        ./scripts/update-history.sh \
          "${{ github.event.inputs.torrent_url }}" \
          "${{ github.event.inputs.download_path }}" \
          "${{ github.repository }}" \
          "${{ github.ref_name }}"
    
    - name: Commit and push files
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add "${{ github.event.inputs.download_path }}/"
        git add download_history.md
        git add download_history/
        git commit -m "Download torrent files $(TZ='Asia/Tehran' date +%Y-%m-%d_%H-%M) [skip ci]" || echo "No changes to commit"
        git push
