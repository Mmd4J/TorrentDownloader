name: Torrent Downloader

on:
  workflow_dispatch:
    inputs:
      torrent_url:
        description: 'Torrent URL or Magnet Link'
        required: true
        type: string
      max_connections:
        description: 'Max connections per file (default: 16)'
        required: false
        type: string
        default: '16'
      split_size:
        description: 'Split size in MB (default: 95)'
        required: false
        type: string
        default: '95'
      select_files:
        description: 'Select specific files (comma-separated indexes, e.g., "1,3,5" or leave empty for all)'
        required: false
        type: string
        default: ''
      file_pattern:
        description: 'File pattern to match (e.g., "*.mkv", "*.mp4" or leave empty for all)'
        required: false
        type: string
        default: ''
      mode:
        description: 'Operation mode'
        required: true
        type: choice
        options:
          - 'Download Files'
          - 'Show Torrent Info Only'
        default: 'Download Files'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 p7zip-full p7zip-rar wget curl jq
      
      - name: Create directories
        run: |
          mkdir -p downloads history .temp scripts
      
      - name: Setup scripts
        run: |
          # Create split script
          cat > scripts/split_large_files.sh << 'EOF'
          #!/bin/bash
          DOWNLOAD_DIR="$1"
          SPLIT_SIZE_MB="${2:-95}"
          SPLIT_SIZE=$((SPLIT_SIZE_MB * 1048576))
          
          find "$DOWNLOAD_DIR" -type f ! -name "*.torrent" ! -name "*.aria2" ! -name "*.7z.*" -print0 | while IFS= read -r -d '' file; do
              FILE_SIZE=$(stat -c%s "$file" 2>/dev/null)
              if [ "$FILE_SIZE" -gt "$SPLIT_SIZE" ]; then
                  echo "Splitting: $(basename "$file") ($(numfmt --to=iec $FILE_SIZE))"
                  7z a -v${SPLIT_SIZE_MB}m -mx0 "${file}.7z" "$file"
                  if [ $? -eq 0 ]; then
                      rm "$file"
                  fi
              fi
          done
          echo "File splitting complete!"
          EOF
          
          # Create report script
          cat > scripts/generate_report.sh << 'EOF'
          #!/bin/bash
          DOWNLOAD_DIR="$1"
          TIMESTAMP="$2"
          TORRENT_URL="$3"
          REPORT_DIR="history/${TIMESTAMP}"
          mkdir -p "$REPORT_DIR"
          
          echo "{" > "${REPORT_DIR}/manifest.json"
          echo "  \"timestamp\": \"${TIMESTAMP}\"," >> "${REPORT_DIR}/manifest.json"
          echo "  \"torrent\": \"${TORRENT_URL}\"," >> "${REPORT_DIR}/manifest.json"
          echo "  \"download_date\": \"$(date -u +"%Y-%m-%d %H:%M:%S UTC")\"," >> "${REPORT_DIR}/manifest.json"
          echo "  \"download_dir\": \"downloads/$(basename "$DOWNLOAD_DIR")\"," >> "${REPORT_DIR}/manifest.json"
          echo "  \"files\": [" >> "${REPORT_DIR}/manifest.json"
          
          FIRST=true
          find "$DOWNLOAD_DIR" -type f ! -name "*.torrent" ! -name "*.aria2" -print0 | sort -z | while IFS= read -r -d '' file; do
              REL_PATH="${file#$DOWNLOAD_DIR/}"
              FILE_SIZE=$(stat -c%s "$file" 2>/dev/null)
              FILE_HASH=$(sha256sum "$file" | cut -d' ' -f1)
              [ "$FIRST" = false ] && echo "," >> "${REPORT_DIR}/manifest.json"
              FIRST=false
              echo "    {\"path\": \"${REL_PATH}\", \"size\": ${FILE_SIZE}, \"size_human\": \"$(numfmt --to=iec $FILE_SIZE 2>/dev/null || echo "${FILE_SIZE} bytes")\", \"sha256\": \"${FILE_HASH}\"}" >> "${REPORT_DIR}/manifest.json"
          done
          
          echo "  ]" >> "${REPORT_DIR}/manifest.json"
          echo "}" >> "${REPORT_DIR}/manifest.json"
          echo "Report generated!"
          EOF
          
          # Create update history script
          cat > scripts/update_history.sh << 'EOF'
          #!/bin/bash
          TIMESTAMP="$1"
          TORRENT_URL="$2"
          REPO="$3"
          BRANCH="${4:-main}"
          
          MANIFEST_FILE="history/${TIMESTAMP}/manifest.json"
          HISTORY_README="history/README.md"
          
          if [ ! -f "$MANIFEST_FILE" ]; then
              echo "Error: Manifest not found at $MANIFEST_FILE"
              exit 1
          fi
          
          TEHRAN_TIME=$(TZ='Asia/Tehran' date +'%Y-%m-%d %H:%M')
          DOWNLOAD_DIR=$(jq -r '.download_dir' "$MANIFEST_FILE")
          
          # Start building entry
          ENTRY="### 📅 ${TEHRAN_TIME} (Tehran)"$'\n\n'
          ENTRY+="**Torrent/Magnet:**"$'\n'
          ENTRY+='```'$'\n'"${TORRENT_URL}"$'\n''```'$'\n\n'
          ENTRY+="**Files:**"$'\n\n'
          
          # Process files
          while IFS= read -r file_json; do
              FILE_PATH=$(echo "$file_json" | jq -r '.path')
              FILE_SIZE=$(echo "$file_json" | jq -r '.size_human')
              ENCODED_PATH=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$FILE_PATH")
              DOWNLOAD_URL="https://raw.githubusercontent.com/${REPO}/${BRANCH}/${DOWNLOAD_DIR}/${ENCODED_PATH}"
              
              if [[ "$FILE_PATH" =~ \.7z\.([0-9]{3})$ ]]; then
                  # Split file part
                  BASE_NAME="${FILE_PATH%.7z.*}"
                  PART_NUM="${BASH_REMATCH[1]}"
                  echo "${BASE_NAME}|${FILE_PATH}|${FILE_SIZE}|${DOWNLOAD_URL}" >> /tmp/split_files.txt
              else
                  # Normal file
                  case "$FILE_PATH" in
                      *.zip) ICON="🗜️" ;;
                      *.mkv|*.mp4|*.avi|*.mov) ICON="🎬" ;;
                      *.mp3|*.flac|*.ogg|*.m4a) ICON="🎵" ;;
                      *.jpg|*.png|*.gif|*.webp) ICON="🖼️" ;;
                      *.pdf) ICON="📕" ;;
                      *) ICON="📄" ;;
                  esac
                  ENTRY+="- ${ICON} [**${FILE_PATH}**](${DOWNLOAD_URL}) - ${FILE_SIZE}"$'\n'
              fi
          done < <(jq -c '.files[]' "$MANIFEST_FILE")
          
          # Process split file groups
          if [ -f /tmp/split_files.txt ]; then
              # Get unique base names
              cut -d'|' -f1 /tmp/split_files.txt | sort -u | while read -r BASE_NAME; do
                  TOTAL_SIZE=0
                  PARTS=()
                  while IFS='|' read -r base path size url; do
                      if [ "$base" = "$BASE_NAME" ]; then
                          PARTS+=("$path|$size|$url")
                          SIZE_NUM=$(echo "$size" | sed 's/[^0-9.]//g')
                          TOTAL_SIZE=$((TOTAL_SIZE + SIZE_NUM))
                      fi
                  done < /tmp/split_files.txt
                  
                  TOTAL_SIZE_HUMAN=$(numfmt --to=iec $TOTAL_SIZE 2>/dev/null || echo "${TOTAL_SIZE} bytes")
                  ENTRY+=$'\n'"- 📦 **${BASE_NAME}.7z** (Split Archive - ${TOTAL_SIZE_HUMAN} total)"$'\n'
                  
                  PART_NUM=1
                  TOTAL_PARTS=${#PARTS[@]}
                  for part_info in "${PARTS[@]}"; do
                      IFS='|' read -r path size url <<< "$part_info"
                      if [ $PART_NUM -eq $TOTAL_PARTS ]; then
                          PREFIX="  └─"
                      else
                          PREFIX="  ├─"
                      fi
                      ENTRY+="${PREFIX} 📎 [**${path}**](${url}) - ${size}"$'\n'
                      PART_NUM=$((PART_NUM + 1))
                  done
                  ENTRY+="  💡 *Download all parts, then:* \`7z x ${PARTS[0]%%|*}\`"$'\n'
              done
              rm /tmp/split_files.txt
          fi
          
          ENTRY+=$'\n'"---"$'\n\n'
          
          # Update history README
          if [ -f "$HISTORY_README" ]; then
              python3 -c "
          content = open('$HISTORY_README').read()
          entry = '''$ENTRY'''
          if '## 📥 Download History' in content:
              parts = content.split('## 📥 Download History', 1)
              new_content = parts[0] + '## 📥 Download History\n\n' + entry + parts[1]
          else:
              new_content = content + '\n' + entry
          open('$HISTORY_README', 'w').write(new_content)
          "
          else
              cat > "$HISTORY_README" << ENDMARKER
          # 📥 Torrent Download History
          
          All times in **Tehran timezone (IR)**.
          
          ## 📥 Download History
          
          ${ENTRY}
          ENDMARKER
          fi
          
          echo "History updated!"
          EOF
          
          chmod +x scripts/*.sh
      
      - name: Get torrent info and list files
        id: torrent_info
        run: |
          TORRENT_INPUT="${{ github.event.inputs.torrent_url }}"
          
          if [[ "$TORRENT_INPUT" != magnet:* ]]; then
            echo "Downloading torrent file..."
            wget -O ".temp/torrent.torrent" "$TORRENT_INPUT"
            TORRENT_FILE=".temp/torrent.torrent"
          else
            echo "Getting magnet link info..."
            aria2c --show-files=true --dir=".temp" --bt-save-metadata=true --bt-metadata-only=true "$TORRENT_INPUT" 2>&1
            TORRENT_FILE=$(find ".temp" -name "*.torrent" | head -n1)
          fi
          
          if [ -f "$TORRENT_FILE" ]; then
            aria2c --show-files=true "$TORRENT_FILE" 2>&1 | grep -E '^[[:space:]]*[0-9]+\|' > ".temp/file_list.txt"
            
            INDEX=1
            > ".temp/parsed_files.txt"
            while IFS='|' read -r idx size path; do
              idx=$(echo "$idx" | xargs)
              size=$(echo "$size" | xargs)
              path=$(echo "$path" | xargs)
              [ -z "$path" ] && continue
              SIZE_HUMAN=$(numfmt --to=iec $size 2>/dev/null || echo "${size} bytes")
              echo "[${INDEX}] ${path} (${SIZE_HUMAN})"
              echo "${INDEX}|${idx}|${size}|${path}" >> ".temp/parsed_files.txt"
              INDEX=$((INDEX + 1))
            done < ".temp/file_list.txt"
            
            echo "torrent_file=${TORRENT_FILE}" >> $GITHUB_OUTPUT
          fi
      
      - name: Show torrent info only
        if: github.event.inputs.mode == 'Show Torrent Info Only'
        run: |
          TEHRAN_TIME=$(TZ='Asia/Tehran' date +'%Y-%m-%d %H:%M')
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          mkdir -p "history/${TIMESTAMP}"
          
          {
            echo "# 📋 Torrent Contents"
            echo ""
            echo "**Date:** ${TEHRAN_TIME} (Tehran)"
            echo ""
            echo "**Torrent/Magnet:**"
            echo '```'
            echo "${{ github.event.inputs.torrent_url }}"
            echo '```'
            echo ""
            echo "**Files:**"
            echo ""
            echo "| # | File | Size |"
            echo "|---|------|------|"
            
            if [ -f ".temp/parsed_files.txt" ]; then
              while IFS='|' read -r display_idx aria2_idx size path; do
                SIZE_HUMAN=$(numfmt --to=iec $size 2>/dev/null || echo "${size} bytes")
                echo "| ${display_idx} | \`${path}\` | ${SIZE_HUMAN} |"
              done < ".temp/parsed_files.txt"
            fi
            
            echo ""
            echo "> 💡 Run again with **mode: Download Files** and optional **select_files: 1,3,5**"
          } > "history/${TIMESTAMP}/torrent_info.md"
          
          if [ -f "history/README.md" ]; then
            sed -i "/^## 📥 Download History/a\\\n### 📋 ${TEHRAN_TIME} - [Torrent Info](${TIMESTAMP}/torrent_info.md)\n" history/README.md
          else
            cat > history/README.md << ENDMARKER
          # 📥 Torrent Download History
          
          All times in **Tehran timezone (IR)**.
          
          ## 📥 Download History
          
          ### 📋 ${TEHRAN_TIME} - [Torrent Info](${TIMESTAMP}/torrent_info.md)
          
          ---
          ENDMARKER
          fi
          
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add history/
          git commit -m "📋 Torrent info: ${TIMESTAMP}" || echo "Nothing to commit"
          git push
      
      - name: Select files to download
        if: github.event.inputs.mode == 'Download Files'
        id: file_selection
        run: |
          SELECT_FILES="${{ github.event.inputs.select_files }}"
          FILE_PATTERN="${{ github.event.inputs.file_pattern }}"
          
          if [ -n "$SELECT_FILES" ] && [ -f ".temp/parsed_files.txt" ]; then
            IFS=',' read -ra INDEXES <<< "$SELECT_FILES"
            ARIA2_INDEXES=()
            for i in "${INDEXES[@]}"; do
              i=$(echo "$i" | xargs)
              ARIA2_IDX=$(grep "^${i}|" ".temp/parsed_files.txt" | cut -d'|' -f2)
              [ -n "$ARIA2_IDX" ] && ARIA2_INDEXES+=("$ARIA2_IDX")
            done
            [ ${#ARIA2_INDEXES[@]} -gt 0 ] && echo "select_option=--select-file=$(IFS=','; echo "${ARIA2_INDEXES[*]}")" >> $GITHUB_OUTPUT
          elif [ -n "$FILE_PATTERN" ] && [ -f ".temp/parsed_files.txt" ]; then
            ARIA2_INDEXES=()
            while IFS='|' read -r display_idx aria2_idx size path; do
              [[ "$path" == $FILE_PATTERN ]] && ARIA2_INDEXES+=("$aria2_idx")
            done < ".temp/parsed_files.txt"
            [ ${#ARIA2_INDEXES[@]} -gt 0 ] && echo "select_option=--select-file=$(IFS=','; echo "${ARIA2_INDEXES[*]}")" >> $GITHUB_OUTPUT
          fi
      
      - name: Download torrent files
        if: github.event.inputs.mode == 'Download Files'
        id: download
        run: |
          echo "STARTING DOWNLOAD..."
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          
          CLEAN_NAME="download"
          if echo "${{ github.event.inputs.torrent_url }}" | grep -q "dn="; then
            CLEAN_NAME=$(echo "${{ github.event.inputs.torrent_url }}" | grep -oP 'dn=[^&]*' | sed 's/dn=//' | python3 -c "import sys, urllib.parse; print(urllib.parse.unquote(sys.stdin.read().strip()))" 2>/dev/null)
            CLEAN_NAME=$(echo "$CLEAN_NAME" | sed 's/[^a-zA-Z0-9._-]/_/g' | cut -c1-100)
          fi
          
          DOWNLOAD_DIR="downloads/${TIMESTAMP}_${CLEAN_NAME}"
          mkdir -p "$DOWNLOAD_DIR"
          echo "Download directory: $DOWNLOAD_DIR"
          
          if [[ "${{ github.event.inputs.torrent_url }}" == magnet:* ]]; then
            ARIA2_INPUT="${{ github.event.inputs.torrent_url }}"
          else
            wget -O "${DOWNLOAD_DIR}/torrent.torrent" "${{ github.event.inputs.torrent_url }}"
            ARIA2_INPUT="${DOWNLOAD_DIR}/torrent.torrent"
          fi
          
          SELECT_OPTION="${{ steps.file_selection.outputs.select_option }}"
          
          echo "Running aria2c..."
          aria2c --seed-time=0 \
                 --max-connection-per-server=${{ github.event.inputs.max_connections }} \
                 --split=${{ github.event.inputs.max_connections }} \
                 --dir="$DOWNLOAD_DIR" \
                 --allow-overwrite=true \
                 --file-allocation=none \
                 $SELECT_OPTION \
                 "$ARIA2_INPUT"
          
          rm -f "${DOWNLOAD_DIR}/torrent.torrent" "${DOWNLOAD_DIR}"/*.aria2
          
          echo "Downloaded files:"
          find "$DOWNLOAD_DIR" -type f -exec ls -lh {} \;
          
          echo "download_dir=${DOWNLOAD_DIR}" >> $GITHUB_OUTPUT
          echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT
      
      - name: Split large files
        if: github.event.inputs.mode == 'Download Files'
        run: |
          bash scripts/split_large_files.sh "${{ steps.download.outputs.download_dir }}" "${{ github.event.inputs.split_size }}"
      
      - name: Generate report
        if: github.event.inputs.mode == 'Download Files'
        run: |
          bash scripts/generate_report.sh \
            "${{ steps.download.outputs.download_dir }}" \
            "${{ steps.download.outputs.timestamp }}" \
            "${{ github.event.inputs.torrent_url }}"
      
      - name: Update history
        if: github.event.inputs.mode == 'Download Files'
        run: |
          bash scripts/update_history.sh \
            "${{ steps.download.outputs.timestamp }}" \
            "${{ github.event.inputs.torrent_url }}" \
            "${{ github.repository }}" \
            "${{ github.ref_name }}"
      
      - name: Commit and push
        if: github.event.inputs.mode == 'Download Files'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          rm -rf .temp
          git add downloads/ history/ scripts/
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📥 Download: ${{ steps.download.outputs.timestamp }}"
            git push
          fi
