name: Torrent Downloader with Auto-Split

on:
  workflow_dispatch:
    inputs:
      torrent_url:
        description: 'Torrent file URL or Magnet link'
        required: true
        type: string
      download_path:
        description: 'Download path (default: downloads)'
        required: false
        type: string
        default: 'downloads'
      max_connections:
        description: 'Max connections per torrent'
        required: false
        type: string
        default: '16'
      max_file_size_mb:
        description: 'Max file size before splitting (MB)'
        required: false
        type: string
        default: '95'

jobs:
  download-and-split:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y aria2 p7zip-full
    
    - name: Make scripts executable
      run: |
        chmod +x scripts/*.sh
    
    - name: Download torrent
      run: |
        ./scripts/download.sh \
          "${{ github.event.inputs.torrent_url }}" \
          "${{ github.event.inputs.download_path }}" \
          "${{ github.event.inputs.max_connections }}"
      timeout-minutes: 360
    
    - name: List downloaded files
      run: |
        echo "=== Downloaded Files ==="
        find ${{ github.event.inputs.download_path }} -type f -not -name '.gitkeep' -exec ls -lah {} \; | head -50
        
        echo ""
        echo "=== Split Files ==="
        if [ -d "${{ github.event.inputs.download_path }}/.split_files" ]; then
          find ${{ github.event.inputs.download_path }}/.split_files -type f -exec ls -lah {} \; | head -50
        else
          echo "No split files"
        fi
        
        echo ""
        echo "=== Manifests ==="
        if [ -d "${{ github.event.inputs.download_path }}/.manifests" ]; then
          find ${{ github.event.inputs.download_path }}/.manifests -type f -exec echo "Manifest: {}" \;
        fi
    
    - name: Generate download summary
      run: |
        echo "# Torrent Download Summary" >> $GITHUB_STEP_SUMMARY
        echo "**Date:** $(date)" >> $GITHUB_STEP_SUMMARY
        echo "**Download Path:** ${{ github.event.inputs.download_path }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        TOTAL_SIZE=$(du -sh ${{ github.event.inputs.download_path }} --exclude=.split_files --exclude=.manifests | cut -f1)
        echo "**Total Size:** $TOTAL_SIZE" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        echo "### Files" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        find ${{ github.event.inputs.download_path }} -type f -not -name '.gitkeep' -not -path '*/.split_files/*' -not -path '*/.manifests/*' -exec ls -lh {} \; >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
    
    - name: Commit and push files
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        # Add all files including split files and manifests
        git add -f ${{ github.event.inputs.download_path }}/.split_files/ || true
        git add -f ${{ github.event.inputs.download_path }}/.manifests/ || true
        git add ${{ github.event.inputs.download_path }}/
        git add scripts/
        
        # Create informative commit message
        COMMIT_MSG="Download torrent files $(date +%Y-%m-%d)"
        if [ -d "${{ github.event.inputs.download_path }}/.split_files" ]; then
          SPLIT_COUNT=$(find ${{ github.event.inputs.download_path }}/.split_files -type d -name "*_parts" | wc -l)
          COMMIT_MSG="$COMMIT_MSG - $SPLIT_COUNT files split"
        fi
        
        git commit -m "$COMMIT_MSG [skip ci]" || echo "No changes to commit"
        git push
