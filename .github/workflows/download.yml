name: Torrent Downloader

on:
  workflow_dispatch:
    inputs:
      torrent_url:
        description: 'Torrent URL or Magnet Link'
        required: true
        type: string
      max_connections:
        description: 'Max connections per file (default: 16)'
        required: false
        type: string
        default: '16'
      split_size:
        description: 'Split size in MB (default: 95)'
        required: false
        type: string
        default: '95'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 p7zip-full p7zip-rar wget curl
      
      - name: Create download directory
        run: |
          mkdir -p downloads
          mkdir -p history
      
      - name: Download torrent
        id: download
        run: |
          # Create unique download folder
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          DOWNLOAD_DIR="downloads/download_${TIMESTAMP}"
          mkdir -p "$DOWNLOAD_DIR"
          
          # Download using aria2
          if [[ "${{ github.event.inputs.torrent_url }}" == magnet:* ]]; then
            aria2c --seed-time=0 \
                   --max-connection-per-server=${{ github.event.inputs.max_connections }} \
                   --split=${{ github.event.inputs.max_connections }} \
                   --dir="$DOWNLOAD_DIR" \
                   --bt-save-metadata=true \
                   "${{ github.event.inputs.torrent_url }}"
          else
            # If it's a URL, download the torrent file first
            wget -O "${DOWNLOAD_DIR}/torrent.torrent" "${{ github.event.inputs.torrent_url }}"
            aria2c --seed-time=0 \
                   --max-connection-per-server=${{ github.event.inputs.max_connections }} \
                   --split=${{ github.event.inputs.max_connections }} \
                   --dir="$DOWNLOAD_DIR" \
                   "${DOWNLOAD_DIR}/torrent.torrent"
          fi
          
          # List downloaded files
          echo "Downloaded files:"
          find "$DOWNLOAD_DIR" -type f ! -name "*.torrent" -exec ls -lh {} \;
          
          # Set output for next steps
          echo "download_dir=${DOWNLOAD_DIR}" >> $GITHUB_OUTPUT
          echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT
      
      - name: Split large files
        run: |
          DOWNLOAD_DIR="${{ steps.download.outputs.download_dir }}"
          SPLIT_SIZE="${{ github.event.inputs.split_size }}"
          
          bash scripts/split_large_files.sh "$DOWNLOAD_DIR" "$SPLIT_SIZE"
      
      - name: Generate download report
        run: |
          DOWNLOAD_DIR="${{ steps.download.outputs.download_dir }}"
          TIMESTAMP="${{ steps.download.outputs.timestamp }}"
          
          bash scripts/generate_report.sh "$DOWNLOAD_DIR" "$TIMESTAMP" "${{ github.event.inputs.torrent_url }}"
      
      - name: Update history
        run: |
          python3 scripts/update_history.py \
            --timestamp "${{ steps.download.outputs.timestamp }}" \
            --torrent "${{ github.event.inputs.torrent_url }}" \
            --repo "${{ github.repository }}"
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Add all downloaded files (Git LFS would be better for large files)
          git add downloads/ history/ history.html
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Download: ${{ steps.download.outputs.timestamp }} - ${{ github.event.inputs.torrent_url }}"
            git push
          fi
