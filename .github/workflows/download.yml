name: Torrent Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Torrent/Magnet/URL (Separate multiple with space, comma, or new line)'
        required: true
        type: string
      mode:
        description: 'Download Mode'
        required: true
        type: choice
        options:
          - 'Torrent - Flat Files'
          - 'Torrent - Preserve Structure'
          - 'Torrent - Zip Entire Folder'
          - 'Torrent - Show Info Only'
          - 'Direct Download'
          - 'Upload as Artifact'
        default: 'Torrent - Flat Files'
      max_connections:
        description: 'Max connections per file (default: 16)'
        required: false
        type: string
        default: '16'
      select_files:
        description: 'Torrent: Select file indexes (e.g., "1,3,5" or empty for all)'
        required: false
        type: string
        default: ''
      file_pattern:
        description: 'Torrent: File pattern (e.g., "*.mkv", "*.mp4" or empty for all)'
        required: false
        type: string
        default: ''
      output_filename:
        description: 'Direct Download: Custom filename (optional)'
        required: false
        type: string
        default: ''

permissions:
  contents: write
  actions: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout history only
        if: github.event.inputs.mode != 'Upload as Artifact'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
          sparse-checkout: |
            .gitattributes
            .github/
            history/
          sparse-checkout-cone-mode: false

      - name: Install dependencies (updates every 7 days)
        run: |
          LAST_UPDATE_FILE=".github/.last_apt_update"
          SHOULD_UPDATE=false
          if [ ! -f "$LAST_UPDATE_FILE" ]; then
            SHOULD_UPDATE=true
          else
            LAST_UPDATE=$(cat "$LAST_UPDATE_FILE")
            NOW=$(date +%s)
            DAYS_OLD=$(( (NOW - LAST_UPDATE) / 86400 ))
            if [ $DAYS_OLD -gt 7 ]; then
              echo "Last update was $DAYS_OLD days ago, refreshing..."
              SHOULD_UPDATE=true
            fi
          fi
          if [ "$SHOULD_UPDATE" = true ]; then
            sudo apt-get update -qq
            sudo apt-get install -y aria2 p7zip-full p7zip-rar curl jq python3
            date +%s > "$LAST_UPDATE_FILE"
          else
            echo "Dependencies up-to-date (updated $DAYS_OLD days ago)"
          fi

      - name: Check existing downloads via manifest
        if: github.event.inputs.mode != 'Upload as Artifact'
        id: check_existing
        run: |
          MODE="${{ github.event.inputs.mode }}"
          TORRENT_URL="${{ github.event.inputs.url }}"
          if [[ "$MODE" == "Direct Download" ]]; then
            if [ -n "${{ github.event.inputs.output_filename }}" ]; then
              CLEAN_NAME=$(echo "${{ github.event.inputs.output_filename }}" | sed 's/[^a-zA-Z0-9._-]/_/g')
            else
              URL_PATH=$(echo "$TORRENT_URL" | sed 's/\?.*//')
              CLEAN_NAME=$(basename "$URL_PATH" | sed 's/[^a-zA-Z0-9._-]/_/g' | cut -c1-100)
              [ -z "$CLEAN_NAME" ] && CLEAN_NAME="download"
            fi
          else
            CLEAN_NAME="download"
            if echo "$TORRENT_URL" | grep -q "dn="; then
              CLEAN_NAME=$(echo "$TORRENT_URL" | grep -oP 'dn=[^&]*' | sed 's/dn=//' | python3 -c "import sys, urllib.parse; print(urllib.parse.unquote(sys.stdin.read().strip()))" 2>/dev/null)
              CLEAN_NAME=$(echo "$CLEAN_NAME" | sed 's/[^a-zA-Z0-9._-]/_/g' | cut -c1-100)
            fi
          fi
          EXISTING_DIR=""
          EXISTING_TIMESTAMP=""
          if [ -d "history" ]; then
            for MANIFEST in history/*/manifest.json; do
              if [ -f "$MANIFEST" ]; then
                MANIFEST_DIR=$(jq -r '.download_dir' "$MANIFEST" 2>/dev/null)
                MANIFEST_URL=$(jq -r '.url' "$MANIFEST" 2>/dev/null)
                if [ "$MANIFEST_URL" = "$TORRENT_URL" ] || echo "$MANIFEST_DIR" | grep -q "_${CLEAN_NAME}$"; then
                  EXISTING_DIR="$MANIFEST_DIR"
                  EXISTING_TIMESTAMP=$(jq -r '.timestamp' "$MANIFEST" 2>/dev/null)
                  echo "Found existing: $EXISTING_DIR"
                  break
                fi
              fi
            done
          fi
          if [ -n "$EXISTING_DIR" ]; then
            echo "existing_dir=${EXISTING_DIR}" >> $GITHUB_OUTPUT
            echo "existing_timestamp=${EXISTING_TIMESTAMP}" >> $GITHUB_OUTPUT
            echo "status=resuming" >> $GITHUB_OUTPUT
          else
            echo "status=new" >> $GITHUB_OUTPUT
          fi
          echo "clean_name=${CLEAN_NAME}" >> $GITHUB_OUTPUT

      - name: Full checkout if resuming
        if: steps.check_existing.outputs.status == 'resuming' && github.event.inputs.mode != 'Upload as Artifact'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
          sparse-checkout: |
            .gitattributes
            .github/
            history/
            ${{ steps.check_existing.outputs.existing_dir }}/
          sparse-checkout-cone-mode: false

      - name: Configure git for binaries
        if: github.event.inputs.mode != 'Upload as Artifact'
        run: |
          cat >> .gitattributes << 'EOF'
          *.7z.* -delta
          *.zip -delta
          *.mp4 -delta
          *.mkv -delta
          *.mp3 -delta
          *.jpg -delta
          *.png -delta
          *.pdf -delta
          *.exe -delta
          *.apk -delta
          EOF
          git config core.compression 0
          git config pack.compression 0

      - name: Cache torrent metadata
        if: contains(github.event.inputs.mode, 'Torrent')
        id: torrent_cache
        uses: actions/cache@v4
        with:
          path: .temp/torrent_cache
          key: torrent-meta-${{ github.event.inputs.url }}

      - name: Get torrent info
        if: contains(github.event.inputs.mode, 'Torrent')
        id: torrent_info
        run: |
          mkdir -p .temp downloads history
          TORRENT_INPUT="${{ github.event.inputs.url }}"
          if [ -f ".temp/torrent_cache/parsed_files.txt" ]; then
            cp .temp/torrent_cache/* .temp/ 2>/dev/null
            TORRENT_FILE=".temp/torrent.torrent"
          else
            if [[ "$TORRENT_INPUT" != magnet:* ]]; then
              aria2c --dir=".temp" --out="torrent.torrent" "$TORRENT_INPUT"
            else
              aria2c --show-files=true --dir=".temp" --bt-save-metadata=true --bt-metadata-only=true "$TORRENT_INPUT" 2>&1
            fi
            TORRENT_FILE=$(find ".temp" -name "*.torrent" 2>/dev/null | head -n1)
            if [ -f "$TORRENT_FILE" ]; then
              aria2c --show-files=true "$TORRENT_FILE" 2>&1 | grep -E '^[[:space:]]*[0-9]+\|' > ".temp/file_list.txt"
              INDEX=1
              > ".temp/parsed_files.txt"
              while IFS='|' read -r idx size path; do
                idx=$(echo "$idx" | xargs); size=$(echo "$size" | xargs); path=$(echo "$path" | xargs)
                [ -z "$path" ] && continue
                echo "${INDEX}|${idx}|${size}|${path}" >> ".temp/parsed_files.txt"
                INDEX=$((INDEX + 1))
              done < ".temp/file_list.txt"
              mkdir -p .temp/torrent_cache
              cp .temp/parsed_files.txt .temp/torrent.torrent .temp/torrent_cache/
            fi
          fi
          if [ -f "$TORRENT_FILE" ]; then
            while IFS='|' read -r index idx size path; do
              SIZE_HUMAN=$(numfmt --to=iec "$size" 2>/dev/null || echo "$size bytes")
              echo "[${index}] ${path} (${SIZE_HUMAN})"
            done < ".temp/parsed_files.txt"
            echo "torrent_file=${TORRENT_FILE}" >> $GITHUB_OUTPUT
          fi

      - name: Show torrent info only
        if: github.event.inputs.mode == 'Torrent - Show Info Only'
        run: |
          TEHRAN_TIME=$(TZ='Asia/Tehran' date +'%Y-%m-%d %H:%M')
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          mkdir -p "history/${TIMESTAMP}"
          {
            echo "# Torrent Contents"
            echo ""
            echo "**Date:** ${TEHRAN_TIME} (Tehran)"
            echo ""
            echo "**Files:**"
            echo ""
            if [ -f ".temp/parsed_files.txt" ]; then
              while IFS='|' read -r display_idx aria2_idx size path; do
                SIZE_HUMAN=$(numfmt --to=iec "$size" 2>/dev/null || echo "$size bytes")
                echo "- [${display_idx}] ${path} (${SIZE_HUMAN})"
              done < ".temp/parsed_files.txt"
            fi
          } > "history/${TIMESTAMP}/torrent_info.md"
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .github/ history/
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "Torrent info: ${TIMESTAMP}"
            git push
          fi

      - name: Determine files to download
        if: contains(github.event.inputs.mode, 'Torrent') && github.event.inputs.mode != 'Torrent - Show Info Only'
        id: file_selection
        run: |
          if [ -n "${{ github.event.inputs.select_files }}" ] && [ -f ".temp/parsed_files.txt" ]; then
            IFS=',' read -ra INDEXES <<< "${{ github.event.inputs.select_files }}"
            ARIA2_INDEXES=()
            for i in "${INDEXES[@]}"; do
              i=$(echo "$i" | xargs)
              ARIA2_IDX=$(grep "^${i}|" ".temp/parsed_files.txt" | cut -d'|' -f2)
              [ -n "$ARIA2_IDX" ] && ARIA2_INDEXES+=("$ARIA2_IDX")
            done
            [ ${#ARIA2_INDEXES[@]} -gt 0 ] && echo "select_option=--select-file=$(IFS=','; echo "${ARIA2_INDEXES[*]}")" >> $GITHUB_OUTPUT
          fi

      - name: Download files
        if: github.event.inputs.mode != 'Torrent - Show Info Only'
        id: download
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          MODE="${{ github.event.inputs.mode }}"
          CLEAN_NAME="${{ steps.check_existing.outputs.clean_name }}"
          if [ "${{ steps.check_existing.outputs.status }}" = "resuming" ] && [ "$MODE" != "Upload as Artifact" ]; then
            DOWNLOAD_DIR="${{ steps.check_existing.outputs.existing_dir }}"
            TIMESTAMP="${{ steps.check_existing.outputs.existing_timestamp }}"
            mkdir -p "$DOWNLOAD_DIR"
          else
            DOWNLOAD_DIR="downloads/${TIMESTAMP}_${CLEAN_NAME}"
            mkdir -p "$DOWNLOAD_DIR"
          fi
          if [[ "$MODE" == "Direct Download" ]]; then
            aria2c --max-connection-per-server=${{ github.event.inputs.max_connections }} \
                   --split=${{ github.event.inputs.max_connections }} \
                   --dir="$DOWNLOAD_DIR" \
                   --out="${CLEAN_NAME}" \
                   --continue=true \
                   --file-allocation=falloc \
                   "${{ github.event.inputs.url }}"
          else
            if [[ "${{ github.event.inputs.url }}" == magnet:* ]]; then
              ARIA2_INPUT="${{ github.event.inputs.url }}"
            else
              aria2c --dir="${DOWNLOAD_DIR}" --out="torrent.torrent" "${{ github.event.inputs.url }}"
              ARIA2_INPUT="${DOWNLOAD_DIR}/torrent.torrent"
            fi
            aria2c --seed-time=0 \
                   --max-connection-per-server=${{ github.event.inputs.max_connections }} \
                   --split=${{ github.event.inputs.max_connections }} \
                   --dir="$DOWNLOAD_DIR" \
                   --continue=true \
                   --file-allocation=falloc \
                   ${{ steps.file_selection.outputs.select_option }} \
                   "$ARIA2_INPUT"
            rm -f "${DOWNLOAD_DIR}/torrent.torrent"
          fi
          echo "download_dir=${DOWNLOAD_DIR}" >> $GITHUB_OUTPUT
          echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT

      - name: Zip entire folder
        if: github.event.inputs.mode == 'Torrent - Zip Entire Folder'
        run: |
          cd "${{ steps.download.outputs.download_dir }}"
          MAIN_FOLDER=$(find . -maxdepth 1 -type d ! -name '.' | head -n1)
          if [ -n "$MAIN_FOLDER" ]; then
            FOLDER_NAME=$(basename "$MAIN_FOLDER")
            ls "${FOLDER_NAME}.zip".* >/dev/null 2>&1 || 7z a -tzip -mx0 -mmt=on "${FOLDER_NAME}.zip" "$MAIN_FOLDER" && rm -rf "$MAIN_FOLDER"
          fi

      - name: Split large files
        if: github.event.inputs.mode != 'Torrent - Show Info Only' && github.event.inputs.mode != 'Upload as Artifact'
        run: |
          DOWNLOAD_DIR="${{ steps.download.outputs.download_dir }}"
          SPLIT_SIZE=$((95 * 1048576))
          echo "Checking for files larger than 95MB..."
          find "$DOWNLOAD_DIR" -type f ! -name "*.7z.*" -print0 | while IFS= read -r -d '' file; do
            FILE_SIZE=$(stat -c%s "$file" 2>/dev/null)
            BASENAME=$(basename "$file")
            DIRNAME=$(dirname "$file")
            EXISTING_PARTS=$(find "$DIRNAME" -maxdepth 1 -name "${BASENAME}.7z.*" 2>/dev/null | head -1)
            if [ -n "$EXISTING_PARTS" ]; then
              echo "Already split: $BASENAME"
              continue
            fi
            if [ "$FILE_SIZE" -gt "$SPLIT_SIZE" ]; then
              echo "Splitting: $BASENAME"
              7z a -v95m -mx0 -mmt=on "${DIRNAME}/${BASENAME}.7z" "$file" && rm "$file"
            fi
          done
          echo "Done."

      - name: Upload as artifact
        if: github.event.inputs.mode == 'Upload as Artifact'
        uses: actions/upload-artifact@v4
        with:
          name: download-${{ steps.download.outputs.timestamp }}
          path: ${{ steps.download.outputs.download_dir }}
          retention-days: 90

      - name: Generate report
        if: github.event.inputs.mode != 'Torrent - Show Info Only' && github.event.inputs.mode != 'Upload as Artifact'
        run: |
          DOWNLOAD_DIR="${{ steps.download.outputs.download_dir }}"
          TIMESTAMP="${{ steps.download.outputs.timestamp }}"
          REPORT_DIR="history/${TIMESTAMP}"
          mkdir -p "$REPORT_DIR"
          echo "{" > "${REPORT_DIR}/manifest.json"
          echo "  \"timestamp\": \"${TIMESTAMP}\"," >> "${REPORT_DIR}/manifest.json"
          echo "  \"url\": \"${{ github.event.inputs.url }}\"," >> "${REPORT_DIR}/manifest.json"
          echo "  \"mode\": \"${{ github.event.inputs.mode }}\"," >> "${REPORT_DIR}/manifest.json"
          echo "  \"download_dir\": \"${DOWNLOAD_DIR}\"," >> "${REPORT_DIR}/manifest.json"
          echo "  \"files\": [" >> "${REPORT_DIR}/manifest.json"
          FIRST=true
          find "$DOWNLOAD_DIR" -type f ! -name "*.torrent" -print0 | sort -z | while IFS= read -r -d '' file; do
            REL_PATH="${file#$DOWNLOAD_DIR/}"
            FILE_SIZE=$(stat -c%s "$file" 2>/dev/null)
            FILE_HASH=$(sha256sum "$file" | cut -d' ' -f1)
            SIZE_HUMAN=$(numfmt --to=iec $FILE_SIZE 2>/dev/null || echo "${FILE_SIZE} bytes")
            [ "$FIRST" = false ] && echo "," >> "${REPORT_DIR}/manifest.json"
            FIRST=false
            echo "    {\"path\": \"${REL_PATH}\", \"size\": ${FILE_SIZE}, \"size_human\": \"${SIZE_HUMAN}\", \"sha256\": \"${FILE_HASH}\"}" >> "${REPORT_DIR}/manifest.json"
          done
          echo "  ]" >> "${REPORT_DIR}/manifest.json"
          echo "}" >> "${REPORT_DIR}/manifest.json"

      - name: Update history
        if: github.event.inputs.mode != 'Torrent - Show Info Only' && github.event.inputs.mode != 'Upload as Artifact'
        run: |
          export TEHRAN_TIME=$(TZ='Asia/Tehran' date +'%Y-%m-%d %H:%M')
          
          cat > /tmp/update_history.py << 'SCRIPTEND'
          import json, urllib.parse, os, re
          from collections import defaultdict
          
          timestamp = os.environ['TIMESTAMP']
          repo = os.environ['REPO']
          branch = os.environ['BRANCH']
          download_dir = os.environ['DOWNLOAD_DIR']
          torrent_url = os.environ['TORRENT_URL']
          mode = os.environ['MODE']
          tehran_time = os.environ['TEHRAN_TIME']
          
          manifest_file = f"history/{timestamp}/manifest.json"
          history_readme = "history/README.md"
          links_file = f"history/{timestamp}/links.txt"
          
          with open(manifest_file) as f:
              manifest = json.load(f)
          
          normal_files = []
          split_groups = defaultdict(list)
          
          for file_info in manifest['files']:
              p = file_info['path']
              mt = re.match(r'(.+)\.7z\.(\d{3})$', p)
              if mt:
                  split_groups[mt.group(1)].append(file_info)
              else:
                  normal_files.append(file_info)
          
          icons = {
              'zip': '🗜️', 'mkv': '🎬', 'mp4': '🎬', 'mov': '🎬', 'webm': '🎬',
              'mp3': '🎵', 'flac': '🎵', 'ogg': '🎵', 'm4a': '🎵',
              'jpg': '🖼️', 'png': '🖼️', 'gif': '🖼️', 'webp': '🖼️',
              'pdf': '📕', 'epub': '📗',
              'txt': '📄', 'srt': '💬',
          }
          
          def get_icon(path):
              ext = path.lower().split('.')[-1] if '.' in path else ''
              return icons.get(ext, '📄')
          
          def make_link(path):
              encoded = urllib.parse.quote(path, safe='')
              return f"https://github.com/{repo}/raw/refs/heads/{branch}/{download_dir}/{encoded}"
          
          all_links = []
          entry_lines = []
          
          entry_lines.append(f"### 📅 {tehran_time} (Tehran)")
          entry_lines.append("")
          entry_lines.append(f"**Mode:** {mode}")
          entry_lines.append("")
          entry_lines.append("**Files:**")
          entry_lines.append("")
          
          for file_info in normal_files:
              l = make_link(file_info['path'])
              all_links.append(l)
              entry_lines.append(f"- {get_icon(file_info['path'])} [**{file_info['path']}**]({l}) - {file_info['size_human']}")
          
          for b, p in sorted(split_groups.items()):
              p.sort(key=lambda x: x['path'])
              ts = sum(x['size'] for x in p)
              if ts >= 1073741824:
                  th = f'{ts/1073741824:.2f}GB'
              elif ts >= 1048576:
                  th = f'{ts/1048576:.1f}MB'
              else:
                  th = f'{ts//1024}KB'
              
              entry_lines.append("")
              entry_lines.append(f"- 📦 **{b}.7z** (Split Archive - {th} total)")
              
              for i, pt in enumerate(p):
                  l = make_link(pt['path'])
                  all_links.append(l)
                  px = "  └─" if i == len(p) - 1 else "  ├─"
                  entry_lines.append(f"{px} 📎 [**{pt['path']}**]({l}) - {pt['size_human']}")
              
              entry_lines.append(f"  💡 *Download all parts, then: `7z x {p[0]['path']}`*")
          
          entry_lines.append("")
          links_raw_url = f"https://github.com/{repo}/raw/refs/heads/{branch}/history/{timestamp}/links.txt"
          entry_lines.append(f"[📋 Download All Links]({links_raw_url})")
          entry_lines.append("")
          entry_lines.append("---")
          entry_lines.append("")
          
          entry = "\n".join(entry_lines)
          
          with open(links_file, 'w') as f:
              f.write("\n".join(all_links) + "\n")
          
          if os.path.exists(history_readme):
              with open(history_readme) as f:
                  content = f.read()
              mk = '## 📥 Download History'
              if mk in content:
                  parts = content.split(mk, 1)
                  new_content = parts[0] + mk + '\n\n' + entry + parts[1]
              else:
                  new_content = content + '\n' + entry
          else:
              new_content = f"# 📥 Torrent Download History\n\nAll times in **Tehran timezone (IR)**.\n\n## 📥 Download History\n\n{entry}"
          
          with open(history_readme, 'w') as f:
              f.write(new_content)
          
          print("History updated!")
          SCRIPTEND
          
          export TIMESTAMP="${{ steps.download.outputs.timestamp }}"
          export REPO="${{ github.repository }}"
          export BRANCH="${{ github.ref_name }}"
          export DOWNLOAD_DIR="${{ steps.download.outputs.download_dir }}"
          export TORRENT_URL="${{ github.event.inputs.url }}"
          export MODE="${{ github.event.inputs.mode }}"
          
          python3 /tmp/update_history.py

      - name: Commit and push changes
        if: github.event.inputs.mode != 'Torrent - Show Info Only' && github.event.inputs.mode != 'Upload as Artifact'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          rm -rf .temp
          git sparse-checkout add "${{ steps.download.outputs.download_dir }}"
          
          git add .github/ history/
          if git diff --cached --quiet; then
            echo "No history changes"
          else
            git commit -m "Update history: ${{ steps.download.outputs.timestamp }}"
          fi
          
          DOWNLOAD_DIR="${{ steps.download.outputs.download_dir }}"
          BATCH_SIZE_MB=500
          echo "Preparing batched commits..."
          NEW_FILES=$(git ls-files --others --exclude-standard "$DOWNLOAD_DIR" 2>/dev/null)
          MODIFIED_FILES=$(git diff --name-only "$DOWNLOAD_DIR" 2>/dev/null)
          ALL_FILES=$(echo -e "$NEW_FILES\n$MODIFIED_FILES" | sort -u | grep -v '^$')
          if [ -z "$ALL_FILES" ]; then
            echo "No new files to commit"
          else
            CURRENT_BATCH_SIZE=0; BATCH_NUM=1; > /dev/shm/batch_files.txt
            while IFS= read -r file; do
              [ -z "$file" ] && continue
              FILE_SIZE=$(stat -c%s "$file" 2>/dev/null || echo 0)
              FILE_SIZE_MB=$((FILE_SIZE / 1048576))
              if [ $((CURRENT_BATCH_SIZE + FILE_SIZE_MB)) -gt $BATCH_SIZE_MB ] && [ -s /dev/shm/batch_files.txt ]; then
                echo "Pushing batch $BATCH_NUM (~$CURRENT_BATCH_SIZE MB)"
                cat /dev/shm/batch_files.txt | xargs -d '\n' git add --sparse
                git commit -m "Download ${{ steps.download.outputs.timestamp }} (Batch $BATCH_NUM)" || echo "Nothing to commit"
                git pull --rebase origin ${{ github.ref_name }} || git pull origin ${{ github.ref_name }}
                git push
                BATCH_NUM=$((BATCH_NUM + 1)); CURRENT_BATCH_SIZE=0; > /dev/shm/batch_files.txt
              fi
              echo "$file" >> /dev/shm/batch_files.txt
              CURRENT_BATCH_SIZE=$((CURRENT_BATCH_SIZE + FILE_SIZE_MB))
            done <<< "$ALL_FILES"
            if [ -s /dev/shm/batch_files.txt ]; then
              echo "Pushing final batch $BATCH_NUM (~$CURRENT_BATCH_SIZE MB)"
              cat /dev/shm/batch_files.txt | xargs -d '\n' git add --sparse
              git commit -m "Download ${{ steps.download.outputs.timestamp }} (Batch $BATCH_NUM)" || echo "Nothing to commit"
              git pull --rebase origin ${{ github.ref_name }} || git pull origin ${{ github.ref_name }}
              git push
            fi
            rm -f /dev/shm/batch_files.txt
          fi
          
          git push origin ${{ github.ref_name }}
          echo "DONE!"
